<div class="app-container">
  <!-- Navigation Bar -->
  <nav class="navbar" *ngIf="authService.isAuthenticated()">
    <div class="nav-content">
      <div class="nav-left">
        <a routerLink="/catalog" class="brand">
          <span class="logo-text">MEDIA<span>HUB</span></span>
        </a>
        <div class="nav-links">
          <a routerLink="/catalog" routerLinkActive="active">Browse</a>
          <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
          <a routerLink="/subscriptions" routerLinkActive="active">Plans</a>
        </div>
      </div>

      <div class="nav-right">
        <div class="user-profile">
          <span class="username">{{ authService.currentUser()?.username }}</span>
          <button (click)="logout()" class="logout-btn">
            Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="main-content" [class.no-nav]="!authService.isAuthenticated()">
    <router-outlet></router-outlet>
  </main>
</div>
